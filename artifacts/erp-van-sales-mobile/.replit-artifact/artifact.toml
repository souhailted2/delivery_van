kind = "mobile"
previewPath = "/mobile/"
title = "ERP Van Sales — Android"
version = "1.0.0"
id = "artifacts/erp-van-sales-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile/" ]
localPort = 20035

[services.development]
run = "pnpm --filter @workspace/erp-van-sales-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/erp-van-sales-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/erp-van-sales-mobile", "run", "serve" ]
