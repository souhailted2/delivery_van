name: Deploy API to Hetzner

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/api-server/**'
      - 'lib/**'
      - '.github/workflows/deploy-hetzner.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Hetzner (5.75.144.100)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Build frontend
        run: |
          PORT=22606 BASE_PATH=/ pnpm --filter @workspace/erp-van-sales run build

      - name: Create deployment archive
        run: |
          tar -czf deploy.tar.gz \
            artifacts/api-server/dist/ \
            artifacts/api-server/package.json \
            artifacts/erp-van-sales/dist/ \
            lib/db/ \
            pnpm-workspace.yaml \
            package.json

      - name: Copy archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          password: ${{ secrets.HETZNER_PASSWORD }}
          source: "deploy.tar.gz"
          target: "/tmp/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          password: ${{ secrets.HETZNER_PASSWORD }}
          script: |
            set -e
            echo "=== Extracting deployment ==="
            cd /var/www/erp-api
            tar -xzf /tmp/deploy.tar.gz --strip-components=0

            echo "=== Installing production dependencies ==="
            cd /var/www/erp-api/artifacts/api-server
            npm install --production --ignore-scripts 2>/dev/null || true

            echo "=== Reloading PM2 ==="
            pm2 reload erp-api --update-env || pm2 restart erp-api

            echo "=== Checking health ==="
            sleep 3
            curl -sf http://localhost:8080/api/healthz && echo "OK" || echo "WARNING: healthz failed"

            echo "=== Done ==="
            rm -f /tmp/deploy.tar.gz
