name: Deploy API to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Hetzner (5.75.144.100)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Build frontend
        run: PORT=22606 BASE_PATH=/ pnpm --filter @workspace/erp-van-sales run build

      - name: Bundle production node_modules for API
        run: |
          cd artifacts/api-server
          npm install --omit=dev --ignore-scripts 2>/dev/null || true
          cd ../..

      - name: Create deployment archive
        run: |
          tar -czf deploy.tar.gz \
            artifacts/api-server/dist/ \
            artifacts/api-server/package.json \
            artifacts/api-server/node_modules/ \
            artifacts/erp-van-sales/dist/public/

      - name: Get server SSH fingerprint
        id: fingerprint
        run: |
          FINGERPRINT=$(ssh-keyscan -H ${{ secrets.HETZNER_HOST }} 2>/dev/null | ssh-keygen -lf - | awk '{print $2}')
          echo "fingerprint=$FINGERPRINT" >> $GITHUB_OUTPUT

      - name: Copy archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          password: ${{ secrets.HETZNER_PASSWORD }}
          source: "deploy.tar.gz"
          target: "/tmp/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          password: ${{ secrets.HETZNER_PASSWORD }}
          script: |
            set -e
            echo "=== Extracting ==="
            mkdir -p /var/www/erp-api
            cd /var/www/erp-api
            tar -xzf /tmp/deploy.tar.gz
            rm -f /tmp/deploy.tar.gz

            echo "=== Reloading PM2 ==="
            pm2 reload erp-api --update-env || pm2 restart erp-api

            echo "=== Health check ==="
            sleep 3
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/healthz)
            echo "Health status: $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "ERROR: Health check failed with status $STATUS"
              exit 1
            fi
            echo "=== Deploy complete ==="
