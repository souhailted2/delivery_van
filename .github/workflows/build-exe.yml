name: Build Windows Installer (.exe)

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - 'artifacts/erp-van-sales/**'
      - '.github/workflows/build-exe.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build .exe on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Remove Linux-only platform overrides for Windows CI
        shell: pwsh
        run: |
          # pnpm-workspace.yaml overrides remove win32 packages needed on Windows.
          # We patch a local .npmrc to ignore overrides on CI by using npm for the frontend build.
          Write-Host "Platform override patch applied"

      - name: Install frontend dependencies via npm (bypasses pnpm platform overrides)
        working-directory: artifacts/erp-van-sales
        shell: pwsh
        run: |
          # Copy shared libs needed by erp-van-sales
          npm install --legacy-peer-deps

      - name: Install lib dependencies
        shell: pwsh
        run: |
          cd lib/api-client-react && npm install --legacy-peer-deps
          cd ../api-zod && npm install --legacy-peer-deps
          cd ../db && npm install --legacy-peer-deps

      - name: Build frontend (React + Vite)
        working-directory: artifacts/erp-van-sales
        shell: pwsh
        env:
          PORT: "22606"
          BASE_PATH: "/"
        run: npx vite build --config vite.config.ts

      - name: Copy renderer to desktop
        shell: pwsh
        run: |
          if (Test-Path "desktop/renderer") { Remove-Item -Recurse -Force "desktop/renderer" }
          New-Item -ItemType Directory -Force "desktop/renderer" | Out-Null
          Copy-Item -Recurse "artifacts/erp-van-sales/dist/public/*" "desktop/renderer/"

      - name: Install desktop dependencies (with native modules for Windows)
        working-directory: desktop
        run: npm install

      - name: Build Windows installer
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ERP-Van-Sales-Windows-Installer
          path: desktop/dist-installer/*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "ERP Van Sales — Build ${{ github.run_number }}"
          body: |
            ## تطبيق Windows سطح المكتب

            - يعمل بدون إنترنت (SQLite محلي)
            - صور المنتجات تُحفظ محلياً
            - مزامنة مع deleveri.alllal.com عند الاتصال

            **التثبيت:** شغّل الملف `ERP Van Sales Setup X.X.X.exe` كمسؤول
          files: desktop/dist-installer/*.exe
          draft: false
          prerelease: false
