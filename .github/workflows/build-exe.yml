name: Build Windows Installer — خفيف بدون Electron

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build NSIS Installer on Windows
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js & pnpm ─────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # ── 3. Patch pnpm workspace — remove Windows-incompatible overrides ───
      - name: Patch pnpm-workspace.yaml
        shell: pwsh
        run: |
          $content = Get-Content pnpm-workspace.yaml -Raw
          $lines   = $content -split "`n"
          $filtered = $lines | Where-Object {
            $_ -notmatch '"esbuild>@esbuild/win32'           -and
            $_ -notmatch '"lightningcss>lightningcss-win32'  -and
            $_ -notmatch '"@tailwindcss/oxide>@tailwindcss/oxide-win32' -and
            $_ -notmatch '"rollup>@rollup/rollup-win32'
          }
          $filtered -join "`n" | Set-Content pnpm-workspace.yaml
          Write-Host "Patched pnpm-workspace.yaml"

      # ── 4. Install workspace deps & build React frontend ──────────────────
      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build React frontend (BASE_PATH=/)
        shell: pwsh
        env:
          PORT: "22606"
          BASE_PATH: "/"
        run: pnpm --filter @workspace/erp-van-sales run build

      - name: Copy renderer to desktop/renderer/
        shell: pwsh
        run: |
          if (Test-Path "desktop/renderer") { Remove-Item -Recurse -Force "desktop/renderer" }
          New-Item -ItemType Directory -Force "desktop/renderer" | Out-Null
          Copy-Item -Recurse "artifacts/erp-van-sales/dist/public/*" "desktop/renderer/"
          Write-Host "Renderer copied — files: $((Get-ChildItem -Recurse 'desktop/renderer').Count)"

      # ── 5. Install desktop production dependencies ────────────────────────
      - name: Install desktop production dependencies (native modules for Windows x64)
        working-directory: desktop
        run: npm install --omit=dev

      # ── 6. Prepare bundle directory with node.exe ─────────────────────────
      - name: Copy node.exe into desktop/bundle/
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "desktop/bundle" | Out-Null
          $nodeExe = (Get-Command node.exe).Source
          Copy-Item $nodeExe "desktop/bundle/node.exe"
          Write-Host "node.exe copied from: $nodeExe"
          Write-Host "Size: $([math]::Round((Get-Item 'desktop/bundle/node.exe').Length / 1MB, 1)) MB"

      # ── 7. Install NSIS ───────────────────────────────────────────────────
      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --yes --no-progress
          # Add NSIS to PATH
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if (Test-Path $nsisPath) {
            echo "$nsisPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "NSIS installed at $nsisPath"
          } else {
            Write-Error "NSIS not found after installation"
          }

      # ── 8. Create output directory & build installer ──────────────────────
      - name: Create dist-standalone directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force "desktop/dist-standalone" | Out-Null

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $nsisExe = "C:\Program Files (x86)\NSIS\makensis.exe"
          & $nsisExe /V4 "desktop\standalone\installer.nsi"
          if ($LASTEXITCODE -ne 0) { throw "NSIS build failed with code $LASTEXITCODE" }
          $installer = Get-Item "desktop/dist-standalone/ERP-Van-Sales-Setup.exe"
          Write-Host "Installer built: $($installer.FullName)"
          Write-Host "Size: $([math]::Round($installer.Length / 1MB, 1)) MB"

      # ── 9. Upload as artifact ─────────────────────────────────────────────
      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ERP-Van-Sales-Windows-Installer
          path: desktop/dist-standalone/ERP-Van-Sales-Setup.exe
          if-no-files-found: error

      # ── 10. Create/update GitHub Release ──────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('build-{0}', github.run_number) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('ERP Van Sales — {0}', github.ref_name) || format('ERP Van Sales — Build {0}', github.run_number) }}
          body: |
            ## 📦 تطبيق Windows سطح المكتب (نسخة خفيفة)

            ### تحميل وتثبيت التطبيق
            1. حمّل ملف `ERP-Van-Sales-Setup.exe` من الأسفل
            2. شغّله كمسؤول (Run as Administrator)
            3. اتبع خطوات التثبيت
            4. سيظهر اختصار **ERP Van Sales** في قائمة Start وعلى سطح المكتب

            ### عند تشغيل التطبيق
            - يبدأ سيرفر محلي تلقائياً
            - يفتح المتصفح على `http://localhost:37891`
            - بيانات قاعدة البيانات في: `%APPDATA%\ERP Van Sales\`

            ### النسخ الاحتياطي
            - انسخ مجلد `%APPDATA%\ERP Van Sales\` لحفظ بياناتك
            - يحتوي على ملف `erp-van-sales.db` (قاعدة البيانات SQLite)

            ### الاستخدام الشبكي (شبكة محلية LAN)
            - شغّل التطبيق على جهاز الخادم
            - افتح المتصفح على الأجهزة الأخرى على: `http://[IP الخادم]:37891`

            ---
            **المميزات:** بدون Electron، خفيف على الذاكرة والمعالج، يعمل بدون إنترنت

          files: desktop/dist-standalone/ERP-Van-Sales-Setup.exe
          draft: false
          prerelease: false
