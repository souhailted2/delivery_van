name: Build Windows Installer — Electron

on:
  # Desktop installer builds run ONLY on manual dispatch — decoupled from the
  # cloud deploy so a `main` push or release tag does NOT auto-build the desktop
  # app. Trigger intentionally via the Actions "Run workflow" button or `gh`.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Electron Installer on Windows
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js & pnpm ─────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # ── 3. Patch pnpm workspace — remove Windows-incompatible overrides ───
      - name: Patch pnpm-workspace.yaml
        shell: pwsh
        run: |
          $content = Get-Content pnpm-workspace.yaml -Raw
          $lines   = $content -split "`n"
          $filtered = $lines | Where-Object {
            $_ -notmatch '"esbuild>@esbuild/win32'           -and
            $_ -notmatch '"lightningcss>lightningcss-win32'  -and
            $_ -notmatch '"@tailwindcss/oxide>@tailwindcss/oxide-win32' -and
            $_ -notmatch '"rollup>@rollup/rollup-win32'
          }
          $filtered -join "`n" | Set-Content pnpm-workspace.yaml
          Write-Host "Patched pnpm-workspace.yaml"

      # ── 4. Install workspace deps & build React frontend ──────────────────
      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate API client (orval)
        run: pnpm --filter @workspace/api-spec exec orval --config ./orval.config.ts

      - name: Build React frontend (BASE_PATH=/)
        shell: pwsh
        env:
          PORT: "22606"
          BASE_PATH: "/"
        run: pnpm --filter @workspace/erp-van-sales run build

      - name: Copy renderer to desktop/renderer/
        shell: pwsh
        run: |
          if (Test-Path "desktop/renderer") { Remove-Item -Recurse -Force "desktop/renderer" }
          New-Item -ItemType Directory -Force "desktop/renderer" | Out-Null
          Copy-Item -Recurse "artifacts/erp-van-sales/dist/public/*" "desktop/renderer/"
          Write-Host "Renderer copied — files: $((Get-ChildItem -Recurse 'desktop/renderer').Count)"

      # ── 5. Install desktop dependencies (Electron + native modules) ────────
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install --no-fund --no-audit

      # ── 6. Rebuild native modules for Electron ─────────────────────────────
      - name: Rebuild better-sqlite3 for Electron
        working-directory: desktop
        run: npx electron-rebuild -f -w better-sqlite3
        continue-on-error: false

      # ── 7. Generate placeholder icon if missing ───────────────────────────
      - name: Ensure build/icon.ico exists
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "desktop/build" | Out-Null
          if (-not (Test-Path "desktop/build/icon.ico")) {
            # Download a placeholder icon
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/electron/electron/main/shell/browser/resources/win/electron.ico" -OutFile "desktop/build/icon.ico" -ErrorAction SilentlyContinue
            if (-not (Test-Path "desktop/build/icon.ico")) {
              # Create minimal 1x1 ICO file as fallback
              $bytes = [byte[]](0x00,0x00,0x01,0x00,0x01,0x00,0x01,0x01,0x00,0x00,0x01,0x00,0x18,0x00,0x30,0x00,0x00,0x00,0x16,0x00,0x00,0x00,0x28,0x00,0x00,0x00,0x01,0x00,0x00,0x00,0x02,0x00,0x00,0x00,0x01,0x00,0x18,0x00,0x00,0x00,0x00,0x00,0x04,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0xFF,0xFF,0xFF,0x00,0x00,0x00,0xFF,0xFF)
              [System.IO.File]::WriteAllBytes("desktop/build/icon.ico", $bytes)
            }
            Write-Host "Icon created"
          } else {
            Write-Host "Icon already exists"
          }

      # ── 8a. Set desktop/package.json version from tag or run number ──────────
      # electron-updater compares the installed version (from package.json)
      # with the version in latest.yml to decide whether an update is available.
      # v*.*.* tags → use the semver; workflow_dispatch without a tag → 0.0.<N>.
      # Uses node -e instead of ConvertFrom-Json/ConvertTo-Json: PowerShell 5.1
      # unwraps single-element JSON arrays into scalars on roundtrip, which would
      # corrupt the "win.target" and "publish" arrays in desktop/package.json.
      - name: Set package version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^v(\d+\.\d+\.\d+)$') {
            $version = $Matches[1]
          } else {
            $version = "0.0.${{ github.run_number }}"
          }
          node -e @"
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('desktop/package.json', 'utf8'));
            p.version = '$version';
            fs.writeFileSync('desktop/package.json', JSON.stringify(p, null, 2) + '\n');
          "@
          Write-Host "Package version set to $version"

      # ── 8b. Build Electron installer ───────────────────────────────────────
      - name: Build Electron installer (electron-builder)
        working-directory: desktop
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run dist
          $installer = Get-Item "dist-electron\*Setup*.exe" -ErrorAction SilentlyContinue
          if (-not $installer) { $installer = Get-Item "dist-electron\*.exe" -ErrorAction SilentlyContinue }
          if ($installer) {
            Write-Host "Installer built: $($installer.FullName)"
            Write-Host "Size: $([math]::Round($installer.Length / 1MB, 1)) MB"
          } else {
            Write-Error "No installer found in dist-electron/"
          }

      # ── 9. Find installer path ─────────────────────────────────────────────
      - name: Find installer file
        id: find_installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem "desktop/dist-electron" -Filter "*.exe" -Recurse | Select-Object -First 1
          echo "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "name=$($exe.Name)" >> $env:GITHUB_OUTPUT
          Write-Host "Found: $($exe.FullName)"

      # ── 10. Upload as artifact ─────────────────────────────────────────────
      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ERP-Van-Sales-Windows-Installer
          path: ${{ steps.find_installer.outputs.path }}
          if-no-files-found: error

      # ── 11. Create/update GitHub Release ──────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('build-{0}', github.run_number) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('ERP Van Sales — {0}', github.ref_name) || format('ERP Van Sales — Build {0}', github.run_number) }}
          body: |
            ## 📦 تطبيق Windows سطح المكتب — Electron

            ### تحميل وتثبيت التطبيق
            1. حمّل ملف `ERP-Van-Sales-Setup.exe` من الأسفل
            2. شغّله كمسؤول (Run as Administrator)
            3. اتبع خطوات التثبيت
            4. سيظهر اختصار **ERP Van Sales** في قائمة Start وعلى سطح المكتب

            ### عند تشغيل التطبيق
            - نافذة البرنامج تفتح مباشرة — لا متصفح، لا localhost
            - المزامنة تعمل تلقائياً كل 30 ثانية عند الاتصال بالإنترنت
            - اضغط أيقونة ☁️ في الأعلى لإدخال بيانات السيرفر

            ### أول تشغيل — جلب البيانات من الموقع
            1. افتح البرنامج
            2. اضغط **☁️** في شريط الأعلى
            3. أدخل اسم المستخدم وكلمة المرور لـ deleveri.alllal.com
            4. اضغط **حفظ وبدء المزامنة**
            5. خلال ثوانٍ ستظهر كل البيانات

            ### النسخ الاحتياطي
            - اضغط ☁️ → **نسخة احتياطية** → اختر مكان الحفظ
            - الاستعادة: اضغط ☁️ → **استعادة البيانات** → اختر الملف

          files: |
            ${{ steps.find_installer.outputs.path }}
            desktop/dist-electron/latest.yml
            desktop/dist-electron/*.blockmap
          draft: false
          prerelease: false
