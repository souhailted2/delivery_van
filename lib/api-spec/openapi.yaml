        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TruckCashTransferBody"
      responses:
        "201":
          description: Transfer request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashTransfer"

  # CASH
  /cash/trucks/{truckId}:
    get:
      operationId: getTruckCash
      tags: [cash]
      parameters:
        - name: truckId
          in: path
          required: true
          schema:
            type: integer
      summary: Get truck cash balance
      responses:
        "200":
          description: Truck cash
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TruckCash"

  /cash/transfers:
    get:
      operationId: listCashTransfers
      tags: [cash]
      summary: List cash transfer requests
      responses:
        "200":
          description: List of cash transfers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CashTransfer"
    post:
      operationId: createCashTransfer
      tags: [cash]
      summary: Request cash transfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCashTransferBody"
      responses:
        "201":
          description: Transfer request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashTransfer"

  /cash/transfers/{id}/approve:
    post:
      operationId: approveCashTransfer
      tags: [cash]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      summary: Approve cash transfer
      responses:
        "200":
          description: Transfer approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashTransfer"

  /cash/transfers/{id}/reject:
    post:
      operationId: rejectCashTransfer
      tags: [cash]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      summary: Reject cash transfer
      responses:
        "200":
          description: Transfer rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashTransfer"

  # REPORTS
  /reports/dashboard:
    get:
      operationId: getDashboardStats
      tags: [reports]
