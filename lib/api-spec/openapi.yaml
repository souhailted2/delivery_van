            type: string
            format: date
        - name: truckId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Daily report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReport"

  /reports/trucks:
    get:
      operationId: getTruckPerformance
