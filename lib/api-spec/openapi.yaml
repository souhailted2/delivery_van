          type: array
          items:
            $ref: "#/components/schemas/ClientDebt"
        supplierDebts:
          type: array
          items:
            $ref: "#/components/schemas/SupplierDebt"
        totalClientDebt:
          type: number
        totalSupplierDebt:
          type: number
      required:
        - clientDebts
        - supplierDebts
        - totalClientDebt
        - totalSupplierDebt

    ClientDebt:
      type: object
      properties:
        clientId:
          type: integer
        clientName:
          type: string
        phone:
          type: string
          nullable: true
        debtAmount:
          type: number
      required:
        - clientId
        - clientName
        - debtAmount

    SupplierDebt:
      type: object
      properties:
        supplierId:
          type: integer
        supplierName:
          type: string
        phone:
          type: string
          nullable: true
        debtAmount:
          type: number
      required:
        - supplierId
        - supplierName
        - debtAmount

    TopProduct:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        totalQuantity:
          type: number
        totalRevenue:
          type: number
        invoiceCount:
          type: integer
      required:
        - productId
        - productName
        - totalQuantity
        - totalRevenue
        - invoiceCount

    ProductImageUploadResponse:
      type: object
      required: [imageUrl]
      properties:
        imageUrl:
          type: string
          description: The URL to use when displaying or storing the uploaded image.

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
